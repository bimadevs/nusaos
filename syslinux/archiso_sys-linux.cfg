LABEL arch
TEXT HELP
Boot NusaOS live environment on BIOS.
Allows you to install NusaOS or perform system maintenance.
ENDTEXT
MENU LABEL NusaOS (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram=y cow_spacesize=2G quiet

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot NusaOS live on BIOS with speakup screen reader.
ENDTEXT
MENU LABEL NusaOS (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on copytoram=y cow_spacesize=2G quiet
